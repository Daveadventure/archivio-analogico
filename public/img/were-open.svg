<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Strong neon glow (red) -->
    <filter id="neonGlow" x="-60%" y="-70%" width="220%" height="240%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b1"></feGaussianBlur>
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b2"></feGaussianBlur>
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="b3"></feGaussianBlur>
      <feGaussianBlur in="SourceGraphic" stdDeviation="30" result="b4"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b4"></feMergeNode>
        <feMergeNode in="b3"></feMergeNode>
        <feMergeNode in="b2"></feMergeNode>
        <feMergeNode in="b1"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <!-- Frame glow -->
    <filter id="frameGlow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="f1"></feGaussianBlur>
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="f2"></feGaussianBlur>
      <feGaussianBlur in="SourceGraphic" stdDeviation="25" result="f3"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="f3"></feMergeNode>
        <feMergeNode in="f2"></feMergeNode>
        <feMergeNode in="f1"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <!-- Retro red tube gradient -->
    <linearGradient id="redTube" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe1e1"></stop>
      <stop offset="45%" stop-color="#ff2a2a"></stop>
      <stop offset="100%" stop-color="#ff004c"></stop>
    </linearGradient>
  </defs>

  <!-- Perfect tight circular frame -->
  <g filter="url(#frameGlow)">
    <circle cx="512" cy="512" r="255" fill="none" stroke="url(#redTube)" stroke-width="24" stroke-linecap="round" opacity="0.95">
      <animate attributeName="opacity" dur="4s" repeatCount="indefinite" values="1;1;0.65;1;0.85;1;0.5;1;0.9;1" keyTimes="0;0.20;0.25;0.40;0.50;0.65;0.70;0.82;0.90;1"></animate>
    </circle>

    <circle cx="512" cy="512" r="238" fill="none" stroke="#fff0f0" stroke-width="6" opacity="0.45"></circle>
  </g>

  <!-- Retro neon text (two lines, italic, tilted) -->
  <g transform="rotate(-8 512 512)" filter="url(#neonGlow)">
    <!-- WE'RE -->
    <text x="512" y="460" text-anchor="middle" dominant-baseline="middle" font-family="Brush Script MT, Segoe Script, Pacifico, cursive" font-size="175" font-style="italic" fill="none" stroke="url(#redTube)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.96">
      We're
      <animate attributeName="opacity" dur="4s" repeatCount="indefinite" values="0.96;0.96;0.70;0.96;0.85;0.96;0.55;0.96" keyTimes="0;0.20;0.25;0.40;0.50;0.65;0.70;1"></animate>
    </text>

    <text x="512" y="460" text-anchor="middle" dominant-baseline="middle" font-family="Brush Script MT, Segoe Script, Pacifico, cursive" font-size="175" font-style="italic" fill="none" stroke="#fff2f2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.98">
      We're
    </text>

    <!-- OPEN -->
    <text x="512" y="610" text-anchor="middle" dominant-baseline="middle" font-family="Brush Script MT, Segoe Script, Pacifico, cursive" font-size="220" font-style="italic" fill="none" stroke="url(#redTube)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.96">
      open
      <animate attributeName="opacity" dur="4s" repeatCount="indefinite" values="0.96;0.96;0.65;0.96;0.85;0.96;0.50;0.96" keyTimes="0;0.20;0.25;0.40;0.50;0.65;0.70;1"></animate>
    </text>

    <text x="512" y="610" text-anchor="middle" dominant-baseline="middle" font-family="Brush Script MT, Segoe Script, Pacifico, cursive" font-size="220" font-style="italic" fill="none" stroke="#fff2f2" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.98">
      open
    </text>
  </g>
</svg>